[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build]
  base = "gowind"
  command = "npm run build"
  publish = "dist"

# Netlify injects URL / DEPLOY_PRIME_URL at build time for og:image absolute URLs.
