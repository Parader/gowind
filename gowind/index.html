<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="%OG_DESCRIPTION%" />
        <meta name="theme-color" content="#3e4784" />
        <meta name="application-name" content="GoWind" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="GoWind" />

        <title>%OG_TITLE%</title>

        <!-- Open Graph (Facebook, iMessage, Slack, LinkedIn, etc.) -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="GoWind" />
        <meta property="og:title" content="%OG_TITLE%" />
        <meta property="og:description" content="%OG_DESCRIPTION%" />
        <meta property="og:url" content="%SITE_URL%/" />
        <meta property="og:image" content="%OG_IMAGE%" />
        <meta property="og:image:secure_url" content="%OG_IMAGE%" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="%OG_IMAGE_ALT%" />

        <!-- Twitter / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="%OG_TITLE%" />
        <meta name="twitter:description" content="%OG_DESCRIPTION%" />
        <meta name="twitter:image" content="%OG_IMAGE%" />
        <meta name="twitter:image:alt" content="%OG_IMAGE_ALT%" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            // On page load, avoid FOUC. Default to light; ThemeProvider syncs with ui-theme.
            const saved = localStorage.getItem("ui-theme");
            document.documentElement.classList.toggle("dark-mode", saved === "dark");
        </script>
    </body>
</html>
