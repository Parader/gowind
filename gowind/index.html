<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/gowind_logo.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="GoWind — Weather and wind data" />
        <meta name="theme-color" content="#3e4784" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

        <title>GoWind</title>
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            // On page load, avoid FOUC. Default to light; ThemeProvider syncs with ui-theme.
            const saved = localStorage.getItem("ui-theme");
            document.documentElement.classList.toggle("dark-mode", saved === "dark");
        </script>
    </body>
</html>
